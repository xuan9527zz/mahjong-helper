<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>广东红中麻将小助手</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 16px;
    }
    .app {
      max-width: 920px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .subtitle { color: #555; margin-bottom: 16px; line-height: 1.6; }
    .section-title { font-weight: 700; margin: 18px 0 8px; }
    .tiles { display: flex; flex-wrap: wrap; gap: 8px; }
    button.tile {
      min-width: 48px;
      height: 58px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(0,0,0,.06);
    }
    button.tile:active { transform: scale(.97); }
    .selected {
      min-height: 72px;
      padding: 12px;
      border-radius: 14px;
      background: #fafafa;
      border: 1px dashed #ccc;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .tile-wrap { position: relative; }
    .count {
      position: absolute;
      right: -5px;
      top: -7px;
      background: #222;
      color: white;
      border-radius: 999px;
      font-size: 11px;
      padding: 1px 5px;
    }
    .actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .main-btn, .ghost-btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 15px;
      cursor: pointer;
    }
    .main-btn { background: #222; color: white; }
    .ghost-btn { background: #eee; color: #222; }
    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #f7f7ff;
      border: 1px solid #ddddff;
      line-height: 1.65;
      overflow-x: auto;
    }
    .danger { color: #b00020; font-weight: 700; }
    .good { color: #006b3c; font-weight: 700; }
    .red { color: #c60000; font-weight: 700; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
      min-width: 620px;
    }
    th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #fafafa; }
    .note { color: #777; font-size: 13px; margin-top: 10px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="app">
    <h1>广东红中麻将小助手</h1>
    <div class="subtitle">
      规则：红中是万能牌；不算番；不能碰红中；4个红中直接胡；无番数限制。<br>
      点满 <b>14张</b> 后，点击“推荐出牌”。
    </div>

    <div class="section-title">当前手牌：<span id="handCount">0</span>/14</div>
    <div id="selected" class="selected">还没有选择牌</div>

    <div class="actions">
      <button class="main-btn" onclick="recommendDiscard()">推荐出牌</button>
      <button class="ghost-btn" onclick="undoTile()">撤销一张</button>
      <button class="ghost-btn" onclick="clearHand()">清空</button>
    </div>

    <div id="result" class="result">结果会显示在这里。</div>

    <div class="section-title">万子</div>
    <div class="tiles" id="wan"></div>

    <div class="section-title">筒子</div>
    <div class="tiles" id="tong"></div>

    <div class="section-title">条子</div>
    <div class="tiles" id="tiao"></div>

    <div class="section-title">字牌</div>
    <div class="tiles" id="honors"></div>

    <div class="note">
      稳定版说明：这版不会卡死，支持红中万能、4红中直接胡、当前听牌提示、打出后听牌提示。算法目标是快速实战推荐，不含牌河、防守、吃碰决策。
    </div>
  </div>

<script>
  // 编号：0-8万，9-17筒，18-26条，27东 28南 29西 30北 31发 32白，33红中
  const tileNames = [];
  for (let i = 1; i <= 9; i++) tileNames.push(i + '万');
  for (let i = 1; i <= 9; i++) tileNames.push(i + '筒');
  for (let i = 1; i <= 9; i++) tileNames.push(i + '条');
  tileNames.push('东', '南', '西', '北', '发', '白', '红中');

  const hand = [];

  function tileLabel(id) {
    return id === 33 ? '<span class="red">中</span>' : tileNames[id];
  }

  function countTiles(arr) {
    const counts = Array(34).fill(0);
    arr.forEach(id => counts[id]++);
    return counts;
  }

  function renderButtons(containerId, ids) {
    const box = document.getElementById(containerId);
    box.innerHTML = '';
    ids.forEach(id => {
      const btn = document.createElement('button');
      btn.className = 'tile';
      btn.innerHTML = tileLabel(id);
      btn.onclick = () => addTile(id);
      box.appendChild(btn);
    });
  }

  function init() {
    renderButtons('wan', [0,1,2,3,4,5,6,7,8]);
    renderButtons('tong', [9,10,11,12,13,14,15,16,17]);
    renderButtons('tiao', [18,19,20,21,22,23,24,25,26]);
    renderButtons('honors', [27,28,29,30,31,32,33]);
    updateView();
  }

  function addTile(id) {
    if (hand.length >= 14) {
      alert('最多选择14张牌');
      return;
    }
    if (hand.filter(x => x === id).length >= 4) {
      alert('同一种牌最多4张');
      return;
    }
    hand.push(id);
    updateView();
  }

  function removeOne(id) {
    const idx = hand.indexOf(id);
    if (idx >= 0) hand.splice(idx, 1);
    updateView();
  }

  function undoTile() {
    hand.pop();
    updateView();
  }

  function clearHand() {
    hand.length = 0;
    updateView();
    document.getElementById('result').innerHTML = '结果会显示在这里。';
  }

  function updateView() {
    document.getElementById('handCount').textContent = hand.length;
    const selected = document.getElementById('selected');
    if (hand.length === 0) {
      selected.textContent = '还没有选择牌';
      return;
    }

    const counts = countTiles(hand);
    selected.innerHTML = '';
    for (let id = 0; id < 34; id++) {
      if (counts[id] > 0) {
        const wrap = document.createElement('div');
        wrap.className = 'tile-wrap';

        const btn = document.createElement('button');
        btn.className = 'tile';
        btn.innerHTML = tileLabel(id);
        btn.onclick = () => removeOne(id);
        wrap.appendChild(btn);

        if (counts[id] > 1) {
          const badge = document.createElement('span');
          badge.className = 'count';
          badge.textContent = counts[id];
          wrap.appendChild(badge);
        }
        selected.appendChild(wrap);
      }
    }
  }

  function recommendDiscard() {
    const result = document.getElementById('result');
    if (hand.length !== 14) {
      result.innerHTML = '<span class="danger">请先选择14张牌。</span>';
      return;
    }

    const counts = countTiles(hand);

    if (counts[33] >= 4) {
      result.innerHTML = '<span class="good">你有4个红中，按你们规则可以直接胡！</span>';
      return;
    }

    if (isWinning(counts)) {
      result.innerHTML = '<span class="good">这手牌已经可以胡了，不用打。</span>';
      return;
    }

    const discards = [];

    for (let id = 0; id < 34; id++) {
      if (counts[id] === 0) continue;

      const afterDiscard = counts.slice();
      afterDiscard[id]--;

      const winInfo = getWinningDraws(afterDiscard);
      const score = evaluateFast(afterDiscard);
      const improveInfo = getImprovingDraws(afterDiscard, score);

      discards.push({
        id,
        isTenpai: winInfo.total > 0,
        winNames: winInfo.names,
        winTotal: winInfo.total,
        score,
        improveNames: improveInfo.names,
        improveTotal: improveInfo.total
      });
    }

    // 排序原则：能听牌优先；听口张数多优先；否则完成度高；进张多
    discards.sort((a, b) => {
      if (a.isTenpai !== b.isTenpai) return b.isTenpai - a.isTenpai;
      if (a.winTotal !== b.winTotal) return b.winTotal - a.winTotal;
      if (a.score !== b.score) return b.score - a.score;
      if (a.improveTotal !== b.improveTotal) return b.improveTotal - a.improveTotal;
      return a.id - b.id;
    });

    const best = discards[0];
    let html = `<div>建议打：<span class="good">${tileNames[best.id]}</span></div>`;

    if (best.isTenpai) {
      html += `<div class="good">打出后进入听牌！</div>`;
      html += `<div>可胡：${best.winNames.join('、')}，共约 <b>${best.winTotal}</b> 张。</div>`;
    } else {
      html += `<div>当前还未能一打听牌。此打法完成度评分较高，有效改善进张约 <b>${best.improveTotal}</b> 张。</div>`;
      html += `<div>改善牌：${best.improveNames.length ? best.improveNames.join('、') : '暂无'}</div>`;
    }

    html += '<table><tr><th>候选弃牌</th><th>结果</th><th>听口 / 改善牌</th><th>数量</th><th>评分</th></tr>';
    discards.forEach(d => {
      const resultText = d.isTenpai ? '<span class="good">听牌</span>' : '未听';
      const listText = d.isTenpai ? d.winNames.join('、') : (d.improveNames.join('、') || '-');
      const numText = d.isTenpai ? d.winTotal : d.improveTotal;
      html += `<tr><td>${tileNames[d.id]}</td><td>${resultText}</td><td>${listText}</td><td>${numText}</td><td>${d.score}</td></tr>`;
    });
    html += '</table>';

    result.innerHTML = html;
  }

  // 对13张牌：枚举下一摸，能胡的就是听口
  function getWinningDraws(counts13) {
    const names = [];
    let total = 0;

    for (let draw = 0; draw < 34; draw++) {
      if (counts13[draw] >= 4) continue;
      const temp = counts13.slice();
      temp[draw]++;
      if (isWinning(temp)) {
        const left = 4 - counts13[draw];
        names.push(tileNames[draw] + '(' + left + ')');
        total += left;
      }
    }

    return { names, total };
  }

  // 对13张牌：枚举下一摸，评分明显变好就算改善牌
  function getImprovingDraws(counts13, currentScore) {
    const names = [];
    let total = 0;

    for (let draw = 0; draw < 34; draw++) {
      if (counts13[draw] >= 4) continue;
      const temp = counts13.slice();
      temp[draw]++;
      const newScore = evaluateFast(temp);
      if (newScore >= currentScore + 20 || isWinning(temp)) {
        const left = 4 - counts13[draw];
        names.push(tileNames[draw] + '(' + left + ')');
        total += left;
      }
    }

    return { names, total };
  }

  // 胡牌判断：红中万能。只判断普通胡：4组面子 + 1对将。
  function isWinning(counts) {
    const zhong = counts[33];
    if (zhong >= 4) return true;

    const base = counts.slice();
    base[33] = 0;

    // 普通牌作将
    for (let pair = 0; pair < 33; pair++) {
      const needPair = Math.max(0, 2 - base[pair]);
      if (needPair > zhong) continue;

      const temp = base.slice();
      temp[pair] = Math.max(0, temp[pair] - 2);

      if (canFormAllMelds(temp, zhong - needPair)) return true;
    }

    // 两个红中作将
    if (zhong >= 2) {
      if (canFormAllMelds(base.slice(), zhong - 2)) return true;
    }

    return false;
  }

  function canFormAllMelds(counts, wild) {
    const first = counts.findIndex(c => c > 0);

    if (first === -1) {
      return wild % 3 === 0;
    }

    // 尝试刻子：x x x，缺的用红中补
    const needTriplet = 3 - counts[first];
    if (needTriplet >= 0 && needTriplet <= wild) {
      const next = counts.slice();
      next[first] = 0;
      if (canFormAllMelds(next, wild - needTriplet)) return true;
    }

    // 尝试顺子：仅万筒条可以组顺子，字牌不可以
    if (first < 27 && first % 9 <= 6) {
      const a = first, b = first + 1, c = first + 2;
      const needSeq = (counts[a] > 0 ? 0 : 1) + (counts[b] > 0 ? 0 : 1) + (counts[c] > 0 ? 0 : 1);

      if (needSeq <= wild) {
        const next = counts.slice();
        if (next[a] > 0) next[a]--;
        if (next[b] > 0) next[b]--;
        if (next[c] > 0) next[c]--;
        if (canFormAllMelds(next, wild - needSeq)) return true;
      }
    }

    return false;
  }

  // 快速完成度评分：不会卡死。面子最高，搭子其次，红中给灵活分。
  function evaluateFast(counts) {
    const c = counts.slice();
    const zhong = c[33];
    c[33] = 0;

    let meld = 0;
    let pair = 0;
    let taatsu = 0;
    let isolated = 0;

    // 取刻子
    for (let i = 0; i < 33; i++) {
      while (c[i] >= 3) {
        c[i] -= 3;
        meld++;
      }
    }

    // 取顺子
    for (let base = 0; base < 27; base += 9) {
      for (let i = base; i <= base + 6; i++) {
        while (c[i] > 0 && c[i + 1] > 0 && c[i + 2] > 0) {
          c[i]--; c[i + 1]--; c[i + 2]--;
          meld++;
        }
      }
    }

    // 取对子
    for (let i = 0; i < 33; i++) {
      while (c[i] >= 2) {
        c[i] -= 2;
        pair++;
      }
    }

    // 取连续搭子，比如 3-4
    for (let base = 0; base < 27; base += 9) {
      for (let i = base; i <= base + 7; i++) {
        while (c[i] > 0 && c[i + 1] > 0) {
          c[i]--; c[i + 1]--;
          taatsu++;
        }
      }
    }

    // 取间张搭子，比如 3-5
    for (let base = 0; base < 27; base += 9) {
      for (let i = base; i <= base + 6; i++) {
        while (c[i] > 0 && c[i + 2] > 0) {
          c[i]--; c[i + 2]--;
          taatsu++;
        }
      }
    }

    isolated = c.reduce((sum, n) => sum + n, 0);

    let score = 0;
    score += meld * 100;
    score += pair * 28;
    score += taatsu * 20;
    score += zhong * 45;
    score -= isolated * 8;

    // 三个红中时，再摸红中直接胡，所以保留价值更高
    if (zhong === 3) score += 80;

    return score;
  }

  init();
</script>
</body>
</html>
